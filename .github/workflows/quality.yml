name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate public content and media
        run: npm run validate

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Enforce homepage JavaScript budget
        run: npm run validate:bundle

      - name: Dependency audit
        run: npm audit --audit-level=moderate

  browser-smoke:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium and WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser, mobile, reduced-motion, and accessibility smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: output/playwright/
          if-no-files-found: ignore
          retention-days: 7
